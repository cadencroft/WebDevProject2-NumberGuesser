<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guesser</title>
</head>
<body>
    <div class = "gamebox">
        <h1>Number Guesser</h1>
        <p>A secret random number will generated. It is your job to guess this number in the least amount of guesses that you can. For each incorrect guess, you will be told if the secret number is higher or lower than your guess.</p>
    
        <input type="number">
        <button>Submit Guess</button>
        
        <p>Number of guesses: ???</p>
    
    </div>






    
</body>
